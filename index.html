<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Budget App PRO</title>

<style>
body{margin:0;font-family:sans-serif;background:#0b141a;color:white}

/* HEADER */
.header{background:#075E54;padding:10px;position:relative}
.row{display:flex;align-items:center;margin:5px 0}
.label{width:120px}

/* BUTTON */
button{cursor:pointer;border:none;border-radius:6px;padding:5px 8px}

/* MENU */
.menu{
position:absolute;
right:10px;
top:40px;
background:#fff;
color:#000;
padding:8px;
border-radius:8px;
display:none;
}
.menu div{padding:5px;cursor:pointer}
.menu div:hover{background:#eee}

/* CHAT */
.chat{height:300px;overflow:auto;padding:10px}
.bubble{max-width:70%;padding:8px;margin:5px;border-radius:10px}
.left{background:#202c33}
.right{background:#005c4b;align-self:end}

/* INPUT */
.footer{background:#202c33;padding:10px}
.input{width:100%;padding:5px;margin:5px 0}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;align-items:center;justify-content:center
}
.box{background:white;color:black;padding:15px;border-radius:10px;width:300px}

/* LIST */
.list{margin-top:10px}
.item{display:flex;justify-content:space-between;margin:5px 0}

/* TOAST */
.toast{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
background:#333;
padding:10px;
border-radius:10px;
opacity:0;
white-space:pre-line;
}
.show{opacity:1}
.success{background:#25D366}
.error{background:#e53935}
</style>
</head>

<body>

<div class="header">
  <div class="row">
    <div class="label">Bulan</div>
    <select id="bulan">
      <option>Juni</option>
      <option>Juli</option>
    </select>
  </div>

  <div class="row">
    <div class="label">Saldo</div>
    <div id="saldoUI"></div>
  </div>

  <button style="position:absolute;top:10px;right:10px" onclick="toggleMenu()">⋮</button>

  <div id="menu" class="menu">
    <div onclick="openModal()">+ Add Budget</div>
    <div onclick="openList()">📊 List Budget</div>
  </div>
</div>

<div id="chat" class="chat"></div>

<div class="footer">
  <select id="jenis">
    <option>Masuk</option>
    <option>Keluar</option>
  </select>

  <select id="kategori"></select>

  <input id="nominal" class="input" placeholder="Nominal">
  <input id="ket" class="input" placeholder="Keterangan">

  <button onclick="kirim()">Kirim</button>
</div>

<!-- MODAL ADD -->
<div id="modal" class="modal">
  <div class="box">
    <h3>Tambah Budget</h3>
    <input id="m_nama" class="input" placeholder="Nama">
    <input id="m_nominal" class="input" placeholder="Nominal">
    <button onclick="saveBudget()">Simpan</button>
    <button onclick="closeModal()">Batal</button>
  </div>
</div>

<!-- MODAL LIST -->
<div id="listModal" class="modal">
  <div class="box">
    <h3>Budget</h3>
    <div id="budgetList" class="list"></div>
    <button onclick="closeList()">Tutup</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  query, where, doc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = { /* ISI CONFIG */ };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let saldo = 0;
let budgetMap = {};

/* ========== UTIL ========== */
function rp(e){
  let n=e.toString().replace(/[^\d]/g,"");
  return "Rp "+n.replace(/\B(?=(\d{3})+(?!\d))/g,".");
}
function num(v){
  return parseInt(v.replace(/[^\d]/g,""))||0;
}

/* ========== TOAST ========== */
function toast(msg,type="success"){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.className="toast show "+type;
  setTimeout(()=>t.className="toast",2000);
}

/* ========== MENU ========== */
window.toggleMenu=()=>{
  menu.style.display=menu.style.display==="block"?"none":"block";
}

/* ========== MODAL ========== */
window.openModal=()=>modal.style.display="flex";
window.closeModal=()=>modal.style.display="none";

window.openList=()=>{listModal.style.display="flex";loadList()}
window.closeList=()=>listModal.style.display="none";

/* ========== LOAD BUDGET ========== */
async function loadBudget(){
  budgetMap={};
  kategori.innerHTML="";

  const q=query(collection(db,"budget"), where("bulan","==",bulan.value));
  const snap=await getDocs(q);

  snap.forEach(d=>{
    let data=d.data();
    budgetMap[data.nama]={id:d.id,...data};
    kategori.add(new Option(data.nama,data.nama));
  });
}

/* ========== LIST UI ========== */
async function loadList(){
  budgetList.innerHTML="";

  Object.keys(budgetMap).forEach(k=>{
    let b=budgetMap[k];

    let div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      ${k} (${rp(b.sisa)})
      <span>
        <button onclick="editBudget('${k}')">✏️</button>
        <button onclick="delBudget('${k}')">❌</button>
      </span>`;

    budgetList.appendChild(div);
  });
}

/* ========== ADD ========== */
window.saveBudget=async()=>{
  let n=m_nama.value;
  let val=num(m_nominal.value);

  if(!n||!val) return toast("Isi semua","error");

  await addDoc(collection(db,"budget"),{
    bulan:bulan.value,
    nama:n,
    sisa:val
  });

  toast("✅ Budget ditambah");
  closeModal();
  await loadAll();
};

/* ========== EDIT ========== */
window.editBudget=async(k)=>{
  let newVal=prompt("Ubah nominal:");
  if(!newVal)return;

  let b=budgetMap[k];

  await updateDoc(doc(db,"budget",b.id),{
    sisa:num(newVal)
  });

  toast("✅ Budget diupdate");
  loadAll();
};

/* ========== DELETE ========== */
window.delBudget=async(k)=>{
  if(!confirm("Hapus?"))return;

  let b=budgetMap[k];

  await deleteDoc(doc(db,"budget",b.id));

  toast("✅ Dihapus");
  loadAll();
};

/* ========== TRANSAKSI ========== */
window.kirim=async()=>{
  let j=jenis.value;
  let kat=kategori.value;
  let n=num(nominal.value);

  if(!n)return toast("Isi nominal","error");

  if(j==="Keluar"){
    let b=budgetMap[kat];
    if(b.sisa<n)return toast("Budget kurang","error");

    let newS=b.sisa-n;

    await updateDoc(doc(db,"budget",b.id),{sisa:newS});

    budgetMap[kat].sisa=newS;
    saldo-=n;
  }else saldo+=n;

  await addDoc(collection(db,"transaksi"),{
    bulan:bulan.value,jenis:j,kategori:kat,nominal:n,keterangan:ket.value,new:Date()
  });

  saldoUI.innerText=rp(saldo);

  toast(`✅ Berhasil\nSaldo: ${rp(saldo)}`);

  nominal.value="";
};

/* ========== LOAD ALL ========== */
async function loadAll(){
  await loadBudget();
}

await loadAll();

</script>

</body>
</html>
